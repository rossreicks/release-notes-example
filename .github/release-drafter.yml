# Configuration for release-drafter's autolabeler sub-action.
# We only use the autolabeler portion — release notes are generated by
# .github/scripts/draft-release-notes.js, not by release-drafter itself.

autolabeler:
  - label: feature
    title: ['/^feat(\(.+\))?!?:/i']
  - label: fix
    title: ['/^fix(\(.+\))?!?:/i']
  - label: docs
    title: ['/^docs(\(.+\))?!?:/i']
  - label: chore
    title: ['/^chore(\(.+\))?!?:/i']
  - label: refactor
    title: ['/^refactor(\(.+\))?!?:/i']
  - label: perf
    title: ['/^perf(\(.+\))?!?:/i']
  - label: test
    title: ['/^test(\(.+\))?!?:/i']
  - label: ci
    title: ['/^(build|ci)(\(.+\))?!?:/i']
  - label: style
    title: ['/^style(\(.+\))?!?:/i']
