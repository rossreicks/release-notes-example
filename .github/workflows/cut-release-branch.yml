name: Cut Release Branch

on:
  release:
    # `published` fires on initial publish (regular OR pre-release).
    # `released` and `prereleased` fire on transitions between those two states later.
    # The job is idempotent (no-ops if the branch already exists), so the extra
    # triggers are safe and ensure release/<N> exists no matter how the release
    # entered its current state.
    types: [published, released, prereleased]

permissions:
  contents: write

jobs:
  cut:
    name: Auto-create release/<N> branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { tag_name } = context.payload.release;
            const m = tag_name.match(/^(\d+)\./);
            if (!m) {
              core.info(`Tag '${tag_name}' doesn't match <RELEASE>.<PATCH>; skipping.`);
              return;
            }
            const branchName = `release/${m[1]}`;
            const ref = `heads/${branchName}`;
            const { owner, repo } = context.repo;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              core.info(`Branch ${branchName} already exists; nothing to do.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const tagRef = await github.rest.git.getRef({
              owner, repo, ref: `tags/${tag_name}`,
            });
            let sha = tagRef.data.object.sha;
            if (tagRef.data.object.type === 'tag') {
              const tagObj = await github.rest.git.getTag({
                owner, repo, tag_sha: sha,
              });
              sha = tagObj.data.object.sha;
            }

            await github.rest.git.createRef({
              owner, repo, ref: `refs/heads/${branchName}`, sha,
            });
            core.info(`Created ${branchName} at ${sha.slice(0, 7)}.`);
